name: codecov

on:
  pull_request:
  push:
    branches:
      - main
      - snapshot-2026-04-01

permissions:
  contents: read

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::covr
          needs: coverage

      - name: Compute coverage
        shell: Rscript {0}
        run: |
          cov <- covr::package_coverage()
          covr::to_cobertura(cov, filename = "coverage.xml")
          pct <- covr::percent_coverage(cov)
          summary_line <- paste0("Total coverage: ", pct)
          writeLines(summary_line, "coverage-summary.txt")
          step_summary <- Sys.getenv("GITHUB_STEP_SUMMARY")
          if (nzchar(step_summary)) {
            cat("## Coverage\n\n", summary_line, "\n", file = step_summary, append = TRUE, sep = "")
          }

      - name: Upload coverage summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: coverage-summary.txt

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false
